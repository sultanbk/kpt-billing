<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b1a2b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a0e18;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d78e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4a843;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c49631;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fabric" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5d78e;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#f5d78e;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#f5d78e;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  
  <!-- Subtle fabric weave pattern -->
  <g opacity="0.08">
    <line x1="80" y1="16" x2="80" y2="496" stroke="#f5d78e" stroke-width="1"/>
    <line x1="140" y1="16" x2="140" y2="496" stroke="#f5d78e" stroke-width="1"/>
    <line x1="200" y1="16" x2="200" y2="496" stroke="#f5d78e" stroke-width="1"/>
    <line x1="260" y1="16" x2="260" y2="496" stroke="#f5d78e" stroke-width="1"/>
    <line x1="320" y1="16" x2="320" y2="496" stroke="#f5d78e" stroke-width="1"/>
    <line x1="380" y1="16" x2="380" y2="496" stroke="#f5d78e" stroke-width="1"/>
    <line x1="440" y1="16" x2="440" y2="496" stroke="#f5d78e" stroke-width="1"/>
    <line x1="16" y1="80" x2="496" y2="80" stroke="#f5d78e" stroke-width="1"/>
    <line x1="16" y1="140" x2="496" y2="140" stroke="#f5d78e" stroke-width="1"/>
    <line x1="16" y1="200" x2="496" y2="200" stroke="#f5d78e" stroke-width="1"/>
    <line x1="16" y1="260" x2="496" y2="260" stroke="#f5d78e" stroke-width="1"/>
    <line x1="16" y1="320" x2="496" y2="320" stroke="#f5d78e" stroke-width="1"/>
    <line x1="16" y1="380" x2="496" y2="380" stroke="#f5d78e" stroke-width="1"/>
    <line x1="16" y1="440" x2="496" y2="440" stroke="#f5d78e" stroke-width="1"/>
  </g>
  
  <!-- Decorative border -->
  <rect x="36" y="36" width="440" height="440" rx="80" ry="80" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.5"/>
  
  <!-- Top decorative arc (saree drape hint) -->
  <path d="M 130 100 Q 256 60 382 100" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.6"/>
  <path d="M 145 115 Q 256 80 367 115" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4"/>
  
  <!-- KPT Text - Main -->
  <text x="256" y="290" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="160" font-weight="bold" fill="url(#gold)" letter-spacing="8">
    KPT
  </text>
  
  <!-- Decorative line under text -->
  <line x1="120" y1="320" x2="392" y2="320" stroke="url(#gold)" stroke-width="3" opacity="0.7"/>
  <line x1="140" y1="330" x2="372" y2="330" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
  
  <!-- BILLING subtitle -->
  <text x="256" y="380" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="600" fill="#f5d78e" letter-spacing="18" opacity="0.85">
    BILLING
  </text>
  
  <!-- Bottom decorative arc -->
  <path d="M 145 420 Q 256 450 367 420" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4"/>
  
  <!-- Small diamond accents -->
  <polygon points="256,88 262,96 256,104 250,96" fill="url(#gold)" opacity="0.6"/>
  <polygon points="256,430 262,438 256,446 250,438" fill="url(#gold)" opacity="0.5"/>
</svg>
